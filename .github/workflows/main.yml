name: Update News Feeds

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Run Scraper
      run: node scraper.js

    - name: Commit and Push Update Files
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add live-news.json kataeb-live.xml || true
        git diff-index --quiet HEAD || git commit -m "نبض وعواجل مباشرة جديدة ⚡" -a
        git push
