name: Update News Feeds

on:
  schedule:
    - cron: '*/5 * * * *' # مزامنة آلية كل 5 دقائق
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Run Scraper
      run: node scraper.js

    - name: Push Updates
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add kataeb-live.xml || true
        git diff-index --quiet HEAD || git commit -m "تحديث شريط عاجل المباشر ⚡" -a
        git push
