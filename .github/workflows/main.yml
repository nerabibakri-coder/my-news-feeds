name: Update Kataeb RSS Feed

on:
  schedule:
    - cron: '*/15 * * * *' # تحديث أوتوماتيكي كل 15 دقيقة
  workflow_dispatch: # زر التشغيل اليدوي لتجربته الآن

permissions:
  contents: write # إعطاء السيرفر الإذن لحفظ ملف الـ XML داخل حسابك

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4 feedgen cloudscraper

    - name: Run Scraper Script
      run: python scraper.py

    - name: Commit and Push RSS file
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add kataeb_feed.xml
        git commit -m "Auto-update RSS feed [skip ci]" || exit 0
        git push
