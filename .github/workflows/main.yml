name: Update Kataeb RSS Feed

on:
  schedule:
    - cron: '*/15 * * * *' # تشغيل تلقائي دوري كل 15 دقيقة
  workflow_dispatch: # تفعيل زر التشغيل اليدوي فوراً

permissions:
  contents: write # منح السيرفر صلاحية حفظ وتحديث ملف kataeb.xml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4 feedgen

    - name: Run Scraper Script
      run: python scraper.py

    - name: Commit and Push RSS file
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add kataeb.xml
        git commit -m "Auto-update RSS feed [skip ci]" || exit 0
        git push
