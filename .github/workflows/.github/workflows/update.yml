name: Update News Feeds
on:
  schedule:
    - cron: '*/15 * * * *' # تشغيل ذاتي في الخلفية كل 15 دقيقة للأبد
  workflow_dispatch: # زر التشغيل اليدوي الفوري
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Scraper
        run: node scraper.js
      - name: Commit and Push RSS File
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add kataeb.xml
          git commit -m "Update RSS" || exit 0
          git push
